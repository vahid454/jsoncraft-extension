<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JSONcraft</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 800px; height: 580px; overflow: hidden; background: #030712; }
    body { font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace; color: #f3f4f6; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }

    /* Layout */
    .app { display: flex; flex-direction: column; height: 580px; }

    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between;
      padding: 0 14px; height: 40px; border-bottom: 1px solid #1f2937;
      flex-shrink: 0; background: #030712; }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-icon { width: 24px; height: 24px; background: #10b981; border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      color: #030712; font-weight: 700; font-size: 13px; }
    .logo-text { font-weight: 600; font-size: 14px; color: #fff; }
    .header-btns { display: flex; gap: 6px; align-items: center; }
    .hbtn { font-size: 11px; padding: 4px 10px; border-radius: 5px; cursor: pointer;
      border: 1px solid #1f2937; background: transparent; color: #6b7280;
      font-family: inherit; transition: all 0.12s; }
    .hbtn:hover { border-color: #374151; color: #d1d5db; }

    /* Toolbar */
    .toolbar { display: flex; gap: 6px; align-items: center; padding: 5px 12px;
      border-bottom: 1px solid #1f2937; flex-shrink: 0; background: #030712; }
    .tbtn { font-size: 11px; padding: 4px 10px; border-radius: 5px; cursor: pointer;
      border: 1px solid #1f2937; background: transparent; color: #6b7280;
      font-family: inherit; transition: all 0.12s; }
    .tbtn:hover { border-color: #374151; color: #d1d5db; }
    .tbtn.active { border-color: #10b981; color: #10b981; }
    .tbtn:disabled { opacity: 0.3; cursor: not-allowed; }
    .sep { width: 1px; height: 14px; background: #1f2937; }
    .size-label { margin-left: auto; font-size: 10px; color: #374151; }

    /* Main panels */
    .main { display: flex; flex: 1; overflow: hidden; min-height: 0; }

    /* Left input */
    .left { width: 45%; border-right: 1px solid #1f2937; display: flex; flex-direction: column; }
    .panel-header { padding: 4px 12px; border-bottom: 1px solid #1f2937; background: #030712;
      display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #10b981; display: inline-block; }
    .dot.xml { background: #f59e0b; }
    .panel-label { font-size: 10px; color: #4b5563; letter-spacing: 0.1em; }
    textarea { flex: 1; resize: none; border: none; outline: none; padding: 10px;
      background: #030712; color: #f3f4f6; font-size: 11px; line-height: 1.6;
      font-family: inherit; width: 100%; }
    textarea::placeholder { color: #374151; }

    /* Right output */
    .right { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    /* Tabs */
    .tabs { display: flex; padding: 0 8px; border-bottom: 1px solid #1f2937;
      flex-shrink: 0; background: #030712; }
    .tab { padding: 7px 9px; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
      border: none; border-bottom: 2px solid transparent; background: transparent;
      cursor: pointer; color: #4b5563; font-family: inherit; transition: all 0.12s; }
    .tab.active { color: #10b981; border-bottom-color: #10b981; }
    .tab:hover:not(.active) { color: #9ca3af; }

    /* Output area */
    .output { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 10px;
      background: #030712; min-height: 0; }

    /* Error */
    .error-box { display: flex; gap: 8px; background: rgba(127,29,29,0.25);
      border: 1px solid #7f1d1d; border-radius: 6px; padding: 10px; margin-bottom: 10px; }
    .error-x { color: #f87171; flex-shrink: 0; font-size: 12px; }
    .error-title { font-size: 11px; font-weight: 600; color: #fecaca; margin-bottom: 2px; }
    .error-msg { font-size: 10px; opacity: 0.8; color: #fca5a5; word-break: break-all; }

    /* Empty state */
    .empty { display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 8px; opacity: 0.12; user-select: none; }
    .empty-icon { font-size: 36px; font-weight: 700; color: #4b5563; }
    .empty-text { font-size: 11px; color: #6b7280; }

    /* Tree */
    .tree-node { font-size: 11px; line-height: 1.7; }
    .tree-row { display: flex; align-items: baseline; gap: 3px; padding: 1px 0;
      border-radius: 3px; cursor: default; padding-right: 6px; }
    .tree-row:hover { background: rgba(255,255,255,0.03); }
    .tree-row.expandable { cursor: pointer; }
    .arrow { width: 12px; flex-shrink: 0; color: #4b5563; font-size: 9px; text-align: center; }
    .k-str { color: #7dd3fc; }
    .k-idx { color: #6b7280; }
    .colon { color: #374151; margin: 0 3px; }
    .v-str { color: #10b981; }
    .v-num { color: #60a5fa; }
    .v-bool { color: #f59e0b; }
    .v-null { color: #f87171; }
    .v-brace { color: #9ca3af; }
    .v-count { color: #4b5563; font-size: 10px; margin-left: 3px; }

    /* Search */
    .search-input { width: 100%; padding: 8px 30px 8px 10px; border-radius: 7px;
      background: #111827; border: 1px solid #1f2937; color: #e2e8f0;
      font-size: 12px; font-family: inherit; outline: none; margin-bottom: 8px; }
    .search-input:focus { border-color: #10b981; }
    .search-count { font-size: 10px; color: #6b7280; margin-bottom: 6px; }
    .search-row { display: flex; align-items: center; gap: 8px; padding: 5px 8px;
      border-radius: 5px; }
    .search-row:hover { background: rgba(255,255,255,0.03); }
    .search-path { font-size: 10px; color: #94a3b8; flex: 1; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
    .search-copy { font-size: 10px; color: #374151; background: none; border: none;
      cursor: pointer; font-family: inherit; flex-shrink: 0; }
    .search-copy:hover { color: #10b981; }

    /* Raw / pre */
    pre { font-size: 11px; color: #d1d5db; line-height: 1.6;
      white-space: pre-wrap; word-break: break-word; margin: 0; }

    /* Convert */
    .convert-btns { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
    .cbtn { padding: 4px 10px; font-size: 10px; border-radius: 5px; border: 1px solid #374151;
      background: transparent; color: #9ca3af; cursor: pointer; font-family: inherit; }
    .cbtn.active { background: #10b981; border-color: #10b981; color: #030712; font-weight: 700; }
    .convert-output { font-size: 11px; color: #d1d5db; line-height: 1.6;
      white-space: pre-wrap; word-break: break-word; background: #111827;
      border: 1px solid #1f2937; border-radius: 7px; padding: 12px;
      max-height: 300px; overflow-y: auto; }
    .convert-textarea { width: 100%; height: 100px; background: #111827; border: 1px solid #1f2937;
      border-radius: 7px; padding: 10px; font-size: 11px; color: #e2e8f0;
      font-family: inherit; resize: vertical; outline: none; margin-bottom: 8px; }

    /* Footer */
    .footer { flex-shrink: 0; padding: 3px 12px; border-top: 1px solid #1f2937;
      background: #030712; display: flex; align-items: center; justify-content: space-between; }
    .footer-status { font-size: 10px; }
    .footer-link { font-size: 10px; color: #374151; text-decoration: none; }
    .footer-link:hover { color: #10b981; }
    .status-ok { color: #10b981; }
    .status-err { color: #f87171; }
    .status-idle { color: #4b5563; }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">J</div>
      <span class="logo-text">JSONcraft</span>
      <span id="source-badge"></span>
    </div>
    <div class="header-btns">
      <button class="hbtn" onclick="toggleTheme()" id="theme-btn">☀</button>
      <a href="https://jsoncraft-red.vercel.app" target="_blank" class="hbtn" style="text-decoration: none; cursor: pointer;">↗ Full site</a>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="tbtn" id="btn-format" onclick="formatJSON()" disabled>⌥ Format</button>
    <button class="tbtn" id="btn-minify" onclick="minifyJSON()" disabled>⊟ Minify</button>
    <div class="sep"></div>
    <button class="tbtn" id="btn-copy" onclick="copyInput()" disabled>⎘ Copy</button>
    <button class="tbtn" onclick="clearAll()">✕ Clear</button>
    <span class="size-label" id="size-label"></span>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Left -->
    <div class="left">
      <div class="panel-header">
        <span class="dot" id="input-dot"></span>
        <span class="panel-label">INPUT</span>
      </div>
      <textarea id="input-area"
        placeholder="Paste JSON or XML here...&#10;&#10;Or select text on any page,&#10;right-click → Open in JSONcraft"
        oninput="handleInput(this.value)"></textarea>
    </div>

    <!-- Right -->
    <div class="right">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('tree',this)">Tree</button>
        <button class="tab" onclick="switchTab('search',this)">Search</button>
        <button class="tab" onclick="switchTab('convert',this)">Convert</button>
        <button class="tab" onclick="switchTab('raw',this)">Raw</button>
      </div>
      <div class="output" id="output"></div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-status" id="status"><span class="status-idle">Ready</span></span>
    <a href="https://jsoncraft-red.vercel.app" target="_blank" class="footer-link">jsoncraft.in</a>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────
let state = { input:"", parsed:null, error:null, type:"json", tab:"tree", dark:true };

// ── Parse ──────────────────────────────────────────────────
function detectType(v) { return v.trimStart().startsWith("<") ? "xml" : "json"; }

function parseXML(str) {
  const doc = new DOMParser().parseFromString(str, "text/xml");
  if (doc.querySelector("parsererror")) throw new Error("Invalid XML");
  function n2o(node) {
    if (node.nodeType === 3) return node.nodeValue.trim();
    const obj = {};
    for (const a of node.attributes||[]) obj["@"+a.name] = a.value;
    for (const c of node.childNodes) {
      if (c.nodeType===3 && !c.nodeValue.trim()) continue;
      const v = n2o(c);
      if (obj[c.nodeName]!==undefined) {
        if (!Array.isArray(obj[c.nodeName])) obj[c.nodeName]=[obj[c.nodeName]];
        obj[c.nodeName].push(v);
      } else obj[c.nodeName]=v;
    }
    const k=Object.keys(obj);
    if (k.length===1&&k[0]==="#text") return obj["#text"];
    return obj;
  }
  return n2o(doc.documentElement);
}

function handleInput(val) {
  state.input = val;
  if (!val.trim()) { state.parsed=null; state.error=null; state.type="json"; render(); return; }
  state.type = detectType(val);
  try {
    state.parsed = state.type==="xml" ? parseXML(val) : JSON.parse(val);
    state.error = null;
  } catch(e) { state.parsed=null; state.error=e.message; }
  render();
}

// ── Toolbar actions ────────────────────────────────────────
function formatJSON() {
  if (!state.parsed||state.type==="xml") return;
  const v = JSON.stringify(state.parsed,null,2);
  document.getElementById("input-area").value = v;
  state.input = v;
}
function minifyJSON() {
  if (!state.parsed||state.type==="xml") return;
  const v = JSON.stringify(state.parsed);
  document.getElementById("input-area").value = v;
  state.input = v;
}
function copyInput() {
  navigator.clipboard.writeText(state.input);
  const b = document.getElementById("btn-copy");
  b.textContent = "✓ Copied"; setTimeout(()=>b.textContent="⎘ Copy",1500);
}
function clearAll() {
  document.getElementById("input-area").value="";
  state={input:"",parsed:null,error:null,type:"json",tab:state.tab,dark:state.dark};
  render();
}

// ── Tab switch ─────────────────────────────────────────────
function switchTab(name, el) {
  state.tab=name;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  renderOutput();
}

// ── Theme ──────────────────────────────────────────────────
function toggleTheme() {
  state.dark = !state.dark;
  document.getElementById("theme-btn").textContent = state.dark ? "☀" : "☾";
  const d = state.dark;
  const bg  = d?"#030712":"#f8fafc";
  const bg2 = d?"#111827":"#ffffff";
  const bdr = d?"#1f2937":"#e2e8f0";
  const txt = d?"#f3f4f6":"#0f172a";
  const mute= d?"#4b5563":"#94a3b8";
  document.body.style.background = bg;
  document.body.style.color = txt;
  document.querySelectorAll("textarea").forEach(el=>{
    el.style.background=bg; el.style.color=txt;
  });
  document.querySelectorAll(".header,.toolbar,.tabs,.footer,.left,.right,.panel-header,.output").forEach(el=>{
    el.style.background=bg;
  });
  document.querySelectorAll(".hbtn,.tbtn,.tab").forEach(el=>{
    el.style.color=mute;
  });
  renderOutput();
}

// ── Flatten for search ─────────────────────────────────────
function flatten(obj, prefix="") {
  const res=[];
  for (const [k,v] of Object.entries(obj||{})) {
    const path = prefix?`${prefix}.${k}`:k;
    if (v!==null&&typeof v==="object"&&!Array.isArray(v)) res.push(...flatten(v,path));
    else if (Array.isArray(v)) v.forEach((item,i)=>{
      const ap=`${path}[${i}]`;
      if (item!==null&&typeof item==="object") res.push(...flatten(item,ap));
      else res.push({path:ap,value:item});
    });
    else res.push({path,value:v});
  }
  return res;
}

// ── Tree renderer ──────────────────────────────────────────
function renderTree(data, depth=0) {
  const d = state.dark;
  const keyC   = d?"#7dd3fc":"#0369a1";
  const idxC   = d?"#6b7280":"#9ca3af";
  const colonC = d?"#374151":"#d1d5db";
  const braceC = d?"#9ca3af":"#6b7280";
  const countC = d?"#4b5563":"#d1d5db";
  const strC   = d?"#10b981":"#059669";
  const numC   = d?"#60a5fa":"#2563eb";
  const boolC  = d?"#f59e0b":"#d97706";
  const nullC  = d?"#f87171":"#dc2626";
  const hoverBg= d?"rgba(255,255,255,0.03)":"rgba(0,0,0,0.03)";

  function valHtml(v) {
    if (v===null) return `<span style="color:${nullC}">null</span>`;
    if (typeof v==="string") return `<span style="color:${strC}">"${escHtml(v)}"</span>`;
    if (typeof v==="number") return `<span style="color:${numC}">${v}</span>`;
    if (typeof v==="boolean") return `<span style="color:${boolC}">${v}</span>`;
    return "";
  }

  function nodeHtml(val, keyName, depth, id) {
    const isArr = Array.isArray(val);
    const isObj = val!==null&&typeof val==="object";
    const isExp = isObj;
    const entries = isArr ? val.map((v,i)=>[i,v]) : isObj ? Object.entries(val) : [];
    const count = entries.length;
    const pad = depth*14+4;

    let keyHtml = "";
    if (keyName!==undefined) {
      const kh = typeof keyName==="number"
        ? `<span style="color:${idxC}">${keyName}</span>`
        : `<span style="color:${keyC}">"${keyName}"</span>`;
      keyHtml = `${kh}<span style="color:${colonC};margin:0 4px">:</span>`;
    }

    if (!isExp) {
      return `<div style="padding-left:${pad}px;padding-top:1px;padding-bottom:1px">
        <span style="width:12px;display:inline-block"></span>${keyHtml}${valHtml(val)}</div>`;
    }

    const open = depth<2;
    const bracket = isArr?"[":"{";
    const closeBracket = isArr?"]":"}";
    const childrenId = `node-${id}`;

    let childrenHtml = entries.map(([k,v],i)=>nodeHtml(v,k,depth+1,`${id}-${i}`)).join("");
    childrenHtml += `<div style="padding-left:${(depth+1)*14+4}px;padding-top:1px;color:${braceC}">${closeBracket}</div>`;

    return `<div>
      <div style="padding-left:${pad}px;padding-top:1px;padding-bottom:1px;cursor:pointer;border-radius:3px"
           onmouseenter="this.style.background='${hoverBg}'" onmouseleave="this.style.background='transparent'"
           onclick="toggleNode('${childrenId}',this)">
        <span id="arrow-${childrenId}" style="width:12px;display:inline-block;color:${countC};font-size:9px">${open?"▾":"▸"}</span>
        ${keyHtml}<span style="color:${braceC}">${bracket}</span>
        ${!open?`<span style="color:${countC};font-size:10px;margin-left:3px">${count} ${count===1?"item":"items"} ${closeBracket}</span>`:""}
      </div>
      <div id="${childrenId}" style="display:${open?"block":"none"}">${childrenHtml}</div>
    </div>`;
  }

  return `<div style="font-size:11px;line-height:1.7">${nodeHtml(data, undefined, 0, "r")}</div>`;
}

function toggleNode(id, row) {
  const el = document.getElementById(id);
  const arrow = document.getElementById("arrow-"+id);
  if (!el) return;
  const isOpen = el.style.display!=="none";
  el.style.display = isOpen?"none":"block";
  if (arrow) arrow.textContent = isOpen?"▸":"▾";
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── Convert ────────────────────────────────────────────────
let convertMode = "json-yaml";
let convertInput = "";

function flattenObj(obj, prefix="") {
  const r={};
  for (const [k,v] of Object.entries(obj||{})) {
    const p=prefix?`${prefix}.${k}`:k;
    if (v===null||v===undefined){r[p]="";}
    else if (Array.isArray(v)){
      if(!v.length)r[p]="";
      else if(typeof v[0]==="object"&&v[0]!==null)v.forEach((it,i)=>Object.assign(r,flattenObj(it,`${p}[${i}]`)));
      else r[p]=v.join(" | ");
    } else if(typeof v==="object")Object.assign(r,flattenObj(v,p));
    else r[p]=v;
  }
  return r;
}

function toYAML(data) {
  function yamlVal(v,indent){
    if(v===null)return"null";
    if(typeof v==="boolean"||typeof v==="number")return String(v);
    if(typeof v==="string")return v.includes("\n")?`|\\n${v.split("\n").map(l=>" ".repeat(indent+2)+l).join("\n")}`:`"${v.replace(/"/g,'\\"')}"`;
    if(Array.isArray(v))return"\n"+v.map(i=>" ".repeat(indent)+"- "+yamlVal(i,indent+2)).join("\n");
    return"\n"+Object.entries(v).map(([k,val])=>" ".repeat(indent)+k+": "+yamlVal(val,indent+2)).join("\n");
  }
  return Object.entries(data).map(([k,v])=>k+": "+yamlVal(v,2)).join("\n");
}

function toCSV(data) {
  const arr=Array.isArray(data)?data:[data];
  const flat=arr.map(i=>typeof i==="object"&&i?flattenObj(i):{value:i});
  const keys=[...new Set(flat.flatMap(r=>Object.keys(r)))];
  const rows=flat.map(r=>keys.map(k=>{
    const v=r[k]??""; return `"${String(v).replace(/"/g,'""')}"`;
  }).join(","));
  return[keys.join(","),...rows].join("\n");
}

function toXML(data,root="root"){
  const san=t=>String(t).replace(/[^a-zA-Z0-9_\-.]/g,"_");
  const esc=v=>String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const conv=(val,tag)=>{
    const t=san(tag);
    if(val===null||val===undefined)return`<${t}/>`;
    if(typeof val!=="object")return`<${t}>${esc(val)}</${t}>`;
    if(Array.isArray(val))return val.map((v,i)=>"  "+conv(v,`item_${i}`)).join("\n");
    const inner=Object.entries(val).map(([k,v])=>"  "+conv(v,k)).join("\n");
    return`<${t}>\n${inner}\n</${t}>`;
  };
  return`<?xml version="1.0" encoding="UTF-8"?>\n${conv(data,root)}`;
}

function xmlToJSON(str){
  try{
    const doc=new DOMParser().parseFromString(str,"text/xml");
    if(doc.querySelector("parsererror"))return"Error: Invalid XML";
    function n2o(node){
      if(node.nodeType===3)return node.nodeValue.trim();
      const obj={};
      for(const a of node.attributes||[])obj["@"+a.name]=a.value;
      for(const c of node.childNodes){
        if(c.nodeType===3&&!c.nodeValue.trim())continue;
        const v=n2o(c);
        if(obj[c.nodeName]!==undefined){
          if(!Array.isArray(obj[c.nodeName]))obj[c.nodeName]=[obj[c.nodeName]];
          obj[c.nodeName].push(v);
        }else obj[c.nodeName]=v;
      }
      const k=Object.keys(obj);
      if(k.length===1&&k[0]==="#text")return obj["#text"];
      return obj;
    }
    return JSON.stringify(n2o(doc.documentElement),null,2);
  }catch(e){return"Error: "+e.message;}
}

function getConvertResult(){
  if(convertMode==="json-yaml")return toYAML(state.parsed||{});
  if(convertMode==="json-csv")return toCSV(state.parsed||{});
  if(convertMode==="json-xml")return toXML(state.parsed||{});
  if(convertMode==="xml-json")return xmlToJSON(convertInput||state.input);
  if(convertMode==="csv-json"){
    try{
      const lines=convertInput.trim().split("\n");
      const keys=lines[0].split(",").map(k=>k.trim().replace(/^"|"$/g,""));
      const rows=lines.slice(1).map(l=>{
        const vals=l.split(",").map(v=>v.trim().replace(/^"|"$/g,""));
        return Object.fromEntries(keys.map((k,i)=>[k,vals[i]??""]));
      });
      return JSON.stringify(rows,null,2);
    }catch(e){return"Error: "+e.message;}
  }
  if(convertMode==="yaml-json"){
    return"YAML→JSON: paste YAML in the input box above";
  }
  return "";
}

function renderConvert(){
  const modes=[
    {id:"json-yaml",label:"JSON→YAML"},
    {id:"json-csv",label:"JSON→CSV"},
    {id:"json-xml",label:"JSON→XML"},
    {id:"xml-json",label:"XML→JSON"},
    {id:"csv-json",label:"CSV→JSON"},
  ];
  const isTo=["xml-json","csv-json","yaml-json"].includes(convertMode);
  const fromLabel=convertMode.split("-")[0].toUpperCase();
  const result=getConvertResult();
  const d=state.dark;
  const bg2=d?"#111827":"#ffffff";
  const bdr=d?"#1f2937":"#e2e8f0";
  const txt=d?"#d1d5db":"#374151";
  const mute=d?"#6b7280":"#94a3b8";

  return`<div style="display:flex;flex-direction:column;gap:8px;height:100%">
    <div style="display:flex;flex-wrap:wrap;gap:5px;flex-shrink:0">
      ${modes.map(m=>`<button onclick="setConvertMode('${m.id}')"
        style="padding:4px 10px;font-size:10px;border-radius:5px;cursor:pointer;font-family:inherit;
        border:1px solid ${convertMode===m.id?"#10b981":(d?"#374151":"#e2e8f0")};
        background:${convertMode===m.id?"#10b981":"transparent"};
        color:${convertMode===m.id?"#030712":mute};
        font-weight:${convertMode===m.id?"700":"400"}">${m.label}</button>`).join("")}
      <button onclick="copyConvert()" style="margin-left:auto;padding:4px 10px;font-size:10px;
        border-radius:5px;border:1px solid ${d?"#374151":"#e2e8f0"};background:transparent;
        color:${mute};cursor:pointer;font-family:inherit">Copy</button>
    </div>
    ${isTo?`<textarea id="convert-input" placeholder="Paste ${fromLabel} here..."
      onchange="convertInput=this.value;renderOutput()"
      oninput="convertInput=this.value;renderOutput()"
      style="width:100%;height:90px;background:${bg2};border:1px solid ${bdr};border-radius:7px;
      padding:8px;font-size:11px;color:${txt};font-family:inherit;resize:vertical;outline:none">${convertInput}</textarea>`:""}
    ${convertMode==="json-csv"?`<div style="font-size:10px;color:${mute};background:${bg2};
      border:1px solid ${bdr};border-radius:5px;padding:6px 10px">
      Nested → dot notation · Arrays → indexed · Simple arrays → joined with |</div>`:""}
    <div style="font-size:10px;color:${mute};text-transform:uppercase;letter-spacing:0.08em">Output</div>
    <pre style="flex:1;min-height:0;font-size:11px;color:${txt};line-height:1.6;
      white-space:pre-wrap;word-break:break-word;margin:0;background:${bg2};
      border-radius:7px;padding:12px;border:1px solid ${bdr};overflow-y:auto">${escHtml(result)}</pre>
  </div>`;
}

function setConvertMode(m){
  convertMode=m;
  renderOutput();
  // Restore textarea value after re-render
  setTimeout(()=>{
    const el=document.getElementById("convert-input");
    if(el)el.value=convertInput;
  },10);
}

function copyConvert(){
  navigator.clipboard.writeText(getConvertResult());
}

// ── Main render ────────────────────────────────────────────
function render() {
  const hasParsed = !!state.parsed;
  const isXML = state.type === "xml";

  // Toolbar
  document.getElementById("btn-format").disabled = !hasParsed||isXML;
  document.getElementById("btn-minify").disabled = !hasParsed||isXML;
  document.getElementById("btn-copy").disabled   = !hasParsed;
  document.getElementById("btn-format").className = hasParsed&&!isXML ? "tbtn active" : "tbtn";

  // Size
  const size = new Blob([state.input]).size;
  document.getElementById("size-label").textContent = size>0?(size<1024?size+" B":(size/1024).toFixed(1)+" KB"):"";

  // Dot color
  document.getElementById("input-dot").className = "dot" + (isXML?" xml":"");

  // Status
  const st = document.getElementById("status");
  if (state.error) st.innerHTML = `<span class="status-err">✗ Invalid ${isXML?"XML":"JSON"}</span>`;
  else if (hasParsed) st.innerHTML = `<span class="status-ok">✓ Valid ${isXML?"XML":"JSON"}</span>`;
  else st.innerHTML = `<span class="status-idle">Ready</span>`;

  renderOutput();
}

function renderOutput() {
  const out = document.getElementById("output");
  const d = state.dark;
  const mute = d?"#6b7280":"#94a3b8";

  if (state.error) {
    out.innerHTML = `<div class="error-box">
      <div class="error-x">✗</div>
      <div><div class="error-title">Invalid ${state.type==="xml"?"XML":"JSON"}</div>
      <div class="error-msg">${escHtml(state.error)}</div></div></div>`;
    return;
  }

  if (!state.input) {
    out.innerHTML = `<div class="empty">
      <div class="empty-icon">{}</div>
      <div class="empty-text">Paste JSON or XML on the left</div></div>`;
    return;
  }

  if (!state.parsed) return;

  if (state.tab === "tree") {
    out.innerHTML = renderTree(state.parsed);
  } else if (state.tab === "search") {
    const flat = flatten(state.parsed);
    const bg2=d?"#111827":"#ffffff"; const bdr=d?"#1f2937":"#e2e8f0";
    const txt=d?"#e2e8f0":"#1e293b";
    out.innerHTML = `
      <div style="position:relative;margin-bottom:8px">
        <input id="search-q" placeholder="Search keys or values..."
          oninput="renderSearch(this.value)"
          style="width:100%;padding:8px 30px 8px 10px;border-radius:7px;
          background:${bg2};border:1px solid ${bdr};color:${txt};
          font-size:12px;font-family:inherit;outline:none;box-sizing:border-box"/>
      </div>
      <div id="search-count" style="font-size:10px;color:${mute};margin-bottom:6px">${flat.length} results total</div>
      <div id="search-results"></div>`;
    renderSearch("");
  } else if (state.tab === "convert") {
    out.innerHTML = renderConvert();
    const el=document.getElementById("convert-input");
    if(el)el.value=convertInput;
  } else if (state.tab === "raw") {
    out.innerHTML = `<pre>${escHtml(JSON.stringify(state.parsed,null,2))}</pre>`;
  }
}

function renderSearch(q) {
  const flat = flatten(state.parsed||{});
  const results = q.trim()
    ? flat.filter(({path,value})=>path.toLowerCase().includes(q.toLowerCase())||String(value).toLowerCase().includes(q.toLowerCase()))
    : flat;
  const d = state.dark;
  const strC=d?"#10b981":"#059669"; const numC=d?"#60a5fa":"#2563eb";
  const boolC=d?"#f59e0b":"#d97706"; const nullC=d?"#f87171":"#dc2626";
  const pathC=d?"#94a3b8":"#475569"; const hov=d?"rgba(255,255,255,0.03)":"rgba(0,0,0,0.03)";

  document.getElementById("search-count").textContent =
    `${results.length} result${results.length!==1?"s":""}${q?` for "${q}"`:" total"}`;

  function valColor(v){
    if(v===null)return nullC;
    if(typeof v==="boolean")return boolC;
    if(typeof v==="number")return numC;
    return strC;
  }
  function valText(v){
    if(v===null)return"null";
    if(typeof v==="string")return`"${v}"`;
    return String(v);
  }

  document.getElementById("search-results").innerHTML = results.map((r,i)=>`
    <div style="display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:5px"
      onmouseenter="this.style.background='${hov}'" onmouseleave="this.style.background='transparent'">
      <span style="font-size:10px;color:${pathC};flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0">${escHtml(r.path)}</span>
      <span style="font-size:10px;color:${valColor(r.value)};flex-shrink:0">${escHtml(valText(r.value))}</span>
      <button onclick="copyVal('${escHtml(String(r.value))}')"
        style="font-size:10px;color:#374151;background:none;border:none;cursor:pointer;font-family:inherit;flex-shrink:0"
        onmouseenter="this.style.color='#10b981'" onmouseleave="this.style.color='#374151'">copy</button>
    </div>`).join("");
}

function copyVal(v) { navigator.clipboard.writeText(v); }

// ── Init ───────────────────────────────────────────────────
window.addEventListener("message", e => {
  if (e.data?.type === "JSONCRAFT_PAGE_DATA") {
    document.getElementById("input-area").value = e.data.data;
    handleInput(e.data.data);
    const badge = document.getElementById("source-badge");
    badge.textContent = "Auto-detected";
    badge.style.cssText = "font-size:10px;color:#10b981;background:#022c22;padding:2px 7px;border-radius:10px;border:1px solid #10b981;margin-left:6px";
  }
});

chrome.storage.local.get(["jsoncraft_inject","jsoncraft_page"], res => {
  if (res.jsoncraft_inject) {
    document.getElementById("input-area").value = res.jsoncraft_inject;
    handleInput(res.jsoncraft_inject);
    chrome.storage.local.remove("jsoncraft_inject");
    const badge = document.getElementById("source-badge");
    badge.textContent = "From selection";
    badge.style.cssText = "font-size:10px;color:#f59e0b;background:#451a03;padding:2px 7px;border-radius:10px;border:1px solid #92400e;margin-left:6px";
  }
});

render();
</script>
</body>
</html>
